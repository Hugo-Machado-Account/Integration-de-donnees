services:

  postgres:
    image: postgres:18-alpine
    container_name: opensound_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: opensound
      POSTGRES_USER: hop
      POSTGRES_PASSWORD: hop_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hop -d opensound"]
      interval: 10s
      timeout: 5s
      retries: 5

  hop:
    image: apache/hop:2.17.0
    container_name: opensound_hop
    restart: unless-stopped
    environment:
      HOP_LOG_LEVEL: Basic
      HOP_FILE_PATH: /files/pipelines/main_pipeline.hpl
      HOP_PROJECT_FOLDER: /files
      HOP_PROJECT_NAME: opensound
      HOP_ENVIRONMENT_NAME: dev
      HOP_ENVIRONMENT_CONFIG_FILE_NAME_PATHS: /files/config/dev.json
      HOP_RUN_CONFIG: local
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: opensound
      DB_USER: hop
      DB_PASSWORD: hop_password
    ports:
      - "8080:8080"
    volumes:
      - ./hop-files:/files
      - hop_audit:/root/.hop/audit
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  hop_audit: